services:
  postgres:
    image: postgres:16
    container_name: socialpulse_postgres
    environment:
      POSTGRES_USER: socialpulse
      POSTGRES_PASSWORD: socialpulse
      POSTGRES_DB: socialpulse
    ports:
      - "5432:5432"
    volumes:
      - socialpulse_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: socialpulse_redis
    ports:
      - "6379:6379"

  socialpluse.web:
    build:
      context: .
      dockerfile: SocialPluse.Web/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
  seq:
    image: datalust/seq:latest
    container_name: socialpluse-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "SuperSecretPassword123!"
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    restart: unless-stopped
volumes:
  socialpulse_pg:
  seq_data: